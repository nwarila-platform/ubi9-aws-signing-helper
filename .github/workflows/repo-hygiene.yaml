name: Repo Hygiene

# Caller for the org-wide reusable-repo-hygiene workflow hosted in
# nwarila-platform/.github. Evaluates this repo's workflows against the org policy
# (nwarila-platform/.github policies/opa/repo_hygiene.rego): all workflow `uses:` pinned
# to a 40-char commit SHA, and pull_request_target boundary safety (no
# PR-controlled checkout/diff under the privileged token). `source_ref` is
# pinned to the same SHA as the `uses:` ref so the policy and the workflow stay
# in lockstep; tools/verify.py enforces that equality.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: repo-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    permissions:
      contents: read
    uses: nwarila-platform/.github/.github/workflows/reusable-repo-hygiene.yaml@1952b49c95a640734a7549a5d748477b7d74792e
    with:
      source_ref: 1952b49c95a640734a7549a5d748477b7d74792e
